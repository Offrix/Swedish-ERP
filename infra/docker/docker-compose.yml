services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18.0}
    container_name: swedish_erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swedish_erp}
      POSTGRES_USER: ${POSTGRES_USER:-swedish_erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swedish_erp}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - swedish_erp_pgdata:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  valkey:
    image: ${VALKEY_IMAGE:-valkey/valkey:8.0.0-bookworm}
    container_name: swedish_erp_valkey
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${VALKEY_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: swedish_erp_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-swedisherp}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-swedisherp}
    ports:
      - "${MINIO_PORT:-59000}:9000"
      - "${MINIO_CONSOLE_PORT:-59001}:9001"
    volumes:
      - swedish_erp_minio:/data

  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:latest}
    container_name: swedish_erp_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-51025}:1025"
      - "${MAILPIT_UI_PORT:-58025}:8025"

volumes:
  swedish_erp_pgdata:
  swedish_erp_minio:
