name: fas0-ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: "24.14.0"
  PNPM_VERSION: "10.12.4"
  PYTHON_VERSION: "3.14.0"

jobs:
  baseline:
    name: baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
          pnpm --version

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Security
        run: pnpm run security

      - name: Capture runtime info
        run: pnpm run runtime-log > runtime-log.txt
        shell: bash

      - name: Upload runtime log artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-log
          path: runtime-log.txt
